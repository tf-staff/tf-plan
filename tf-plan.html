<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TF-Plan</title>
<script src="https://p.trellocdn.com/power-up.min.js"></script>
<style>
  /* ===== TF design language (matches TF-Recharge) ===================== */
  :root, html[data-color-mode="dark"]{
    --bg:#242528; --panel:#2b2c2f;
    --subtle:rgba(255,255,255,.06); --subtle-h:rgba(255,255,255,.12);
    --line:#46474b; --text:#cecfd2; --dim:#96999e; --dimmer:#85878c;
    --head:#e2e3e5; --blue:#579dff; --green:#4bce97; --red:#f87168; --yellow:#f5cd47;
    --btn-text:#1d2125; --blue-soft:rgba(87,157,255,.12); --blue-edge:rgba(87,157,255,.45);
    --red-soft:rgba(248,113,104,.14);
  }
  html[data-color-mode="light"]{
    --bg:#ffffff; --panel:#ffffff;
    --subtle:rgba(0,0,0,.05); --subtle-h:rgba(0,0,0,.10);
    --line:#dcdfe4; --text:#292a2e; --dim:#6b6e76; --dimmer:#8b8f97;
    --head:#1d2125; --blue:#1d7afc; --green:#22a06b; --red:#e2483d; --yellow:#b38600;
    --btn-text:#ffffff; --blue-soft:rgba(29,122,252,.10); --blue-edge:rgba(29,122,252,.45);
    --red-soft:rgba(226,72,61,.10);
  }
  *{box-sizing:border-box}
  html{background:transparent}
  html,body{margin:0}
  body{background:transparent; color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:14px; -webkit-font-smoothing:antialiased; line-height:1.4; padding:0}
  .num{font-variant-numeric:tabular-nums}
  input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
  input[type=number]{-moz-appearance:textfield}

  #app{padding:2px 4px 6px}
  #app.panelwrap{background:var(--subtle); border-radius:10px; padding:12px 14px; margin:0}

  .head{display:flex; align-items:center; gap:9px; margin-bottom:4px}
  .seg{display:inline-flex; background:var(--subtle); border-radius:6px; padding:2px; gap:2px}
  .seg button{appearance:none; border:0; background:transparent; color:var(--dim); cursor:pointer;
    font:inherit; font-size:11.5px; font-weight:600; padding:4px 9px; border-radius:5px}
  .seg button[aria-pressed="true"]{background:var(--blue); color:var(--btn-text)}
  .seg button:focus-visible{outline:2px solid var(--blue); outline-offset:1px}
  .savechip{font-size:11px;font-weight:600;padding:2px 9px;border-radius:999px;border:1px solid var(--line);color:var(--dim);font-variant-numeric:tabular-nums;white-space:nowrap}
  .savechip.ok{color:var(--green);border-color:rgba(75,206,151,.45)}
  .savechip.err{color:var(--yellow);border-color:rgba(245,205,71,.45)}
  .savechip[hidden]{display:none}
  .push{margin-left:auto}

  .lbl{font-size:11px; color:var(--dim); text-transform:uppercase; letter-spacing:.05em; font-weight:700; margin:9px 0 5px}
  .hintline{font-size:11px; color:var(--dimmer); margin-top:4px}

  select.min,input.min{font:inherit; font-size:12.5px; padding:6px 8px;
    color:var(--text); background:var(--bg); border:1px solid var(--line); border-radius:5px}
  select.min{width:100%; appearance:none; -webkit-appearance:none; padding-right:26px; cursor:pointer;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M2 3l3 3 3-3' stroke='%239fadbc' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");
    background-repeat:no-repeat; background-position:right 9px center}
  .min::placeholder{color:var(--dimmer)}
  .min:focus{outline:0; border-color:var(--blue)}

  /* duration row: 4 presets + inline h/m custom cells */
  .quick{display:flex; gap:4px; align-items:stretch}
  .quick button{appearance:none; cursor:pointer; font:inherit; font-weight:600; font-size:11.5px;
    color:var(--text); background:var(--subtle); border:1px solid transparent; border-radius:5px; padding:6px 0; flex:.75 1 0; min-width:0}
  .quick button:hover{background:var(--subtle-h)}
  .quick button:active{transform:translateY(1px)}
  .quick button[aria-pressed="true"]{background:var(--blue); color:var(--btn-text)}
  .quick .cust{flex:1.15 1 0; min-width:54px; display:flex; align-items:center; position:relative}
  .quick .cust input{width:100%; height:100%; text-align:right; padding:6px 18px 6px 4px; font-size:12px}
  .quick .cust .u{position:absolute; right:6px; font-size:11px; color:var(--dimmer); pointer-events:none}
  .quick .cust input:focus + .u{color:var(--blue)}

  .go{appearance:none; cursor:pointer; font:inherit; font-weight:700; font-size:12.5px; width:100%;
    color:var(--btn-text); background:var(--blue); border:0; border-radius:6px; padding:8px 0; margin-top:10px;
    display:inline-flex; align-items:center; justify-content:center; gap:7px}
  .go:hover{filter:brightness(1.08)}
  .go:active{transform:translateY(1px)}
  .go:disabled{opacity:.4; cursor:not-allowed; filter:none}
  .go svg{display:block}
  .go.inline, .quick button.go.inline{width:auto; flex:0 0 auto; margin-top:0; padding:6px 14px; font-size:12px; border-radius:5px;
    background:var(--blue); color:var(--btn-text)}
  .quick button.go.inline:hover{background:var(--blue); filter:brightness(1.08)}

  .active-timer{background:var(--subtle); border:1px solid var(--line); border-radius:7px; padding:10px 12px 10px; margin-top:2px}
  .at-count{font-size:22px; font-weight:800; color:var(--head); font-variant-numeric:tabular-nums; line-height:1.15;
    display:flex; align-items:center; gap:8px}
  .at-count svg{display:block; flex:0 0 auto}
  .at-count .due{color:var(--head)}
  .at-dest{font-size:12.5px; color:var(--text); margin-top:3px}
  .at-dest b{color:var(--head)}
  .at-meta{font-size:11.5px; color:var(--dimmer); margin-top:2px; font-variant-numeric:tabular-nums}
  .pb-row{display:flex; align-items:center; gap:8px; margin-top:9px}
  .pbar{flex:1 1 auto; height:6px; background:var(--subtle-h); border-radius:999px; overflow:hidden}
  .pfill{height:100%; width:100%; background:var(--blue); border-radius:999px; transition:width 1s linear}
  .pfill.warn{background:var(--yellow)}
  .pfill.due{background:var(--yellow); transition:none}
  .pb-total{flex:0 0 auto; font-size:11px; color:var(--dimmer); font-variant-numeric:tabular-nums}
  .at-row{display:flex; align-items:center; margin-top:6px}
  .link{appearance:none; border:0; background:transparent; cursor:pointer; color:var(--dim);
    font:inherit; font-size:12px; font-weight:600; padding:4px 7px; border-radius:5px}
  .link:hover{background:var(--subtle); color:var(--text)}
  .link.danger{color:var(--dim)}
  .link.danger:hover{background:var(--subtle-h); color:var(--text)}

  /* dashboard */
  .dash{padding:2px 2px 6px}
  .auth-row{display:flex; align-items:center; gap:8px; margin:2px 0 4px}
  .auth-row .who{font-size:11.5px; color:var(--dimmer)}
  table{width:100%; border-collapse:collapse; font-size:12px}
  th{text-align:left; color:var(--dimmer); font-weight:700; font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; padding:4px 4px; border-bottom:1px solid var(--line)}
  td{padding:5px 4px; border-bottom:1px solid var(--line); vertical-align:top; color:var(--dim)}
  td b{color:var(--text); font-weight:600}
  td .sub{font-size:11px; color:var(--dimmer)}
  .cd{font-variant-numeric:tabular-nums; white-space:nowrap}
  .cd.due{color:var(--head); font-weight:700}
  .hist{margin-top:2px}
  .he{display:flex; gap:8px; align-items:center; padding:4px 2px; font-size:12px; border-top:1px solid var(--line)}
  .he:first-child{border-top:0}
  .he .ts{color:var(--dimmer); flex:0 0 62px; display:flex; flex-direction:column; line-height:1.2; font-variant-numeric:tabular-nums}
  .he .ts .tsd{font-size:10px}
  .he .ts .tst{font-size:11px}
  .he .hn{flex:1 1 auto; color:var(--dim); overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .he .hn b{color:var(--text); font-weight:600}
  .he .hn small{color:var(--dimmer); margin-left:5px}
  .empty{font-size:12px; color:var(--dimmer); padding:6px 2px}

  .setup{max-width:560px; margin:26px auto; background:var(--panel); border-radius:10px; padding:16px 20px; color:var(--text)}
  .setup h2{display:flex; align-items:center; gap:8px; font-size:15px; color:var(--head); margin:0 0 8px}
  .setup p,.setup li{font-size:13px; color:var(--dim); line-height:1.55}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* =====================================================================
   TF-Plan — countdown-and-move Power-Up for UC Davis Tech Foundry
   ---------------------------------------------------------------------
   Chassis modes (?mode=):
     connector   — TrelloPowerUp.initialize + board scan loop (default)
     panel       — persistent card-back section (the interface)
     dashboard   — board popup: authorization, all timers, move log
     authreturn  — top-level window Trello redirects to after Allow
   ---------------------------------------------------------------------
   Data model (board-level shared data, single source of truth):
     tfplan_index : { [cardId]: {
         v:3, mode:'move'|'boomerang'|'2step',
         cardName, setByName, createdTs, durationMin,
         stages:[ { destListId, destListName, at, verb }, ... ],
         claimedBy?, claimedAt? } }
       stages execute front-to-back; a stage is due when at <= now.
       move      : [ {dest, at: now+d} ]
       boomerang : [ {dest, at: now}, {origin, at: now+d, verb:'returns to'} ]
       2step     : [ {A, at: now}, {B, at: now+d} ]
     tfplan_log   : [ { cardId, cardName, destListName, setByName, movedTs } ]
   All moves land at the TOP of the destination column (pos=top).
   ===================================================================== */

var APP_KEY  = '6268ba8d8351a5d9b0ca51b209ccd821';
var APP_NAME = 'TF-Plan';
var APP_VERSION = 'v3.7';   // shown after the name; also cache-busts internal iframe URLs

var SCAN_INTERVAL_MS = 15000;
var CLAIM_STALE_MS   = 120000;
var CLAIM_SETTLE_MS  = 900;
var LOG_CAP          = 50;

var CLIENT_ID = 'c-' + Math.random().toString(36).slice(2, 10);
var TOKEN_KEY = 'tfplan_token_' + APP_KEY;

/* ----- clock icons ---------------------------------------------------- */
function clockSvgMarkup(size, color){
  return '<svg xmlns="http://www.w3.org/2000/svg" width="' + size + '" height="' + size + '" viewBox="0 0 16 16">' +
         '<circle cx="8" cy="8" r="6.4" fill="none" stroke="' + color + '" stroke-width="1.7"/>' +
         '<path d="M8 4.6V8.1l2.7 1.7" fill="none" stroke="' + color + '" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>' +
         '</svg>';
}
function clockDataUri(color){
  return 'data:image/svg+xml;utf8,' + encodeURIComponent(clockSvgMarkup(16, color));
}
var ICON_LIGHT_UI = clockDataUri('#42526e');
var ICON_DARK_UI  = clockDataUri('#e2e3e5');
var ICON_NEUTRAL  = clockDataUri('#96999e');
function inlineClock(size){ return clockSvgMarkup(size || 14, 'currentColor'); }

/* ----- token plumbing (partition-proof; see beginAuthorize) ----------- */
function getStoredToken(){
  try { return localStorage.getItem(TOKEN_KEY); } catch(e){ return null; }
}
function storeToken(tok){
  try { localStorage.setItem(TOKEN_KEY, tok); } catch(e){}
}
function clearToken(){
  try { localStorage.removeItem(TOKEN_KEY); } catch(e){}
}
function beginAuthorize(onDone){
  var returnUrl = location.origin + location.pathname + '?mode=authreturn';
  var url = 'https://trello.com/1/authorize' +
            '?expiration=never&name=' + encodeURIComponent(APP_NAME) +
            '&scope=read,write&response_type=token&callback_method=fragment' +
            '&key=' + APP_KEY +
            '&return_url=' + encodeURIComponent(returnUrl);
  window.open(url, 'tfplanauth', 'width=580,height=720');

  function finish(tok){
    window.removeEventListener('message', onMsg);
    clearInterval(pollId);
    storeToken(tok);
    if (onDone) onDone(tok);
  }
  function onMsg(ev){
    if (ev.origin !== location.origin) return;
    if (!ev.data || ev.data.type !== 'tfplan-token' || !ev.data.token) return;
    finish(ev.data.token);
  }
  window.addEventListener('message', onMsg);
  var pollId = setInterval(function(){
    var tok = getStoredToken();
    if (tok) finish(tok);
  }, 2000);
  setTimeout(function(){ clearInterval(pollId); window.removeEventListener('message', onMsg); }, 180000);
}

/* ----- shared helpers -------------------------------------------------- */
function fmtRemaining(ms){
  if (ms <= 0) return 'now';
  var m = Math.ceil(ms / 60000);
  if (m < 60) return m + 'm';
  var h = Math.floor(m / 60), r = m % 60;
  if (h < 24) return r ? (h + 'h ' + r + 'm') : (h + 'h');
  var d = Math.floor(h / 24);
  return d + 'd ' + (h % 24) + 'h';
}
function fmtCountdown(ms){
  if (ms <= 0) return '0:00';
  var s = Math.floor(ms / 1000);
  var h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
  if (h >= 48) return Math.floor(h / 24) + 'd ' + (h % 24) + 'h';
  if (h > 0) return h + ':' + String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
  return m + ':' + String(sec).padStart(2, '0');
}
function fmtClock(ts){
  var d = new Date(ts);
  return d.toLocaleTimeString([], {hour:'numeric', minute:'2-digit'}) + ' ' +
         d.toLocaleDateString([], {month:'short', day:'numeric'});
}
function fmtTsCol(ts){
  var d = new Date(ts);
  return { d: d.toLocaleDateString([], {month:'short', day:'numeric'}),
           t: d.toLocaleTimeString([], {hour:'numeric', minute:'2-digit'}) };
}
function esc(s){
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
function sleep(ms){ return new Promise(function(r){ setTimeout(r, ms); }); }

/* normalize a v2 entry (single dest/endTs) into the v3 staged shape */
function normEntry(e){
  if (e && !e.stages && e.destListId){
    return {
      v: 3, mode: 'move',
      cardName: e.cardName, setByName: e.setByName,
      createdTs: e.startTs || (e.endTs - (e.durationMin || 0) * 60000),
      durationMin: e.durationMin,
      stages: [{ destListId: e.destListId, destListName: e.destListName, at: e.endTs, verb: 'moves to' }],
      claimedBy: e.claimedBy, claimedAt: e.claimedAt
    };
  }
  return e;
}
function pendingStage(e){
  e = normEntry(e);
  return (e && e.stages && e.stages.length) ? e.stages[0] : null;
}

/* cancel semantics: plain entries are removed; a live link entry instead
   reschedules its delete-card stage to now, so the link card gets cleaned
   up by whichever authorized client sees it first. Mutates idx. */
function buildCancel(idx, cardId){
  var e = normEntry(idx[cardId]);
  if (!e){ delete idx[cardId]; return 'deleted'; }
  if (e.mode === 'link' && e.linkCardId){
    var st = (e.stages && e.stages[0]) || {};
    e.stages = [{ action:'delete-card', destListId: st.destListId,
                  destListName: st.destListName || 'column',
                  at: Date.now(), verb:'removes link in', sym:'⧉✕' }];
    delete e.claimedBy; delete e.claimedAt;
    idx[cardId] = e;
    return 'scheduled';
  }
  delete idx[cardId];
  return 'deleted';
}

/* theme detection — Trello sets data-color-mode on <html>, sometimes late */
function detectTheme(t){
  try{
    var c = t && t.getContext && t.getContext();
    if (c && (c.theme === 'dark' || c.theme === 'light')) return c.theme;
  }catch(e){}
  var a = document.documentElement.getAttribute('data-color-mode');
  if (a === 'dark' || a === 'light') return a;
  return 'dark';
}
function applyTheme(t){
  document.documentElement.setAttribute('data-color-mode', detectTheme(t));
}
function themeWithRetries(t){
  applyTheme(t);
  [150, 500, 1200, 2500].forEach(function(ms){ setTimeout(function(){ applyTheme(t); }, ms); });
}

/* =====================================================================
   STAGE EXECUTION — shared by the connector scan loop and the panel
   (for instant first hops when the setting browser is authorized).
   Claim protocol: write claim -> settle -> confirm -> act. First writer
   wins; stale claims (dead client) are stolen after CLAIM_STALE_MS.
   ===================================================================== */

function moveStage(t, cardId, token){
  var executed;        // stage we ended up executing (for the log)
  var entrySnap;
  var createdLinkId;   // set when a create-link stage makes a card
  return t.get('board', 'shared', 'tfplan_index').then(function(index){
    index = index || {};
    var e = normEntry(index[cardId]);
    if (!e) return Promise.reject('gone');
    var st = pendingStage(e);
    if (!st || st.at > Date.now()) return Promise.reject('not-due');
    if (e.claimedBy && e.claimedBy !== CLIENT_ID &&
        (Date.now() - (e.claimedAt || 0)) < CLAIM_STALE_MS) return Promise.reject('claimed-elsewhere');
    e.claimedBy = CLIENT_ID;
    e.claimedAt = Date.now();
    index[cardId] = e;
    return t.set('board', 'shared', 'tfplan_index', index);
  })
  .then(function(){ return sleep(CLAIM_SETTLE_MS); })
  .then(function(){ return t.get('board', 'shared', 'tfplan_index'); })
  .then(function(index){
    index = index || {};
    var e = normEntry(index[cardId]);
    if (!e || e.claimedBy !== CLIENT_ID) return Promise.reject('lost-claim');
    entrySnap = e;
    executed = e.stages[0];
    var act = executed.action || 'move';
    var url, method;
    if (act === 'move'){
      url = 'https://api.trello.com/1/cards/' + cardId +
            '?idList=' + encodeURIComponent(executed.destListId) + '&pos=top' +
            '&key=' + APP_KEY + '&token=' + token;
      method = 'PUT';
    } else if (act === 'create-link'){
      if (!e.sourceUrl) return Promise.reject('link stage missing source url');
      url = 'https://api.trello.com/1/cards' +
            '?idList=' + encodeURIComponent(executed.destListId) +
            '&name=' + encodeURIComponent(e.sourceUrl) +
            '&cardRole=link&pos=top' +
            '&key=' + APP_KEY + '&token=' + token;
      method = 'POST';
    } else { /* delete-card */
      if (!e.linkCardId) return null;   // nothing was ever created; nothing to delete
      url = 'https://api.trello.com/1/cards/' + e.linkCardId +
            '?key=' + APP_KEY + '&token=' + token;
      method = 'DELETE';
    }
    return fetch(url, { method: method }).then(function(resp){
      if (resp.status === 401){
        clearToken();
        console.error('[TF-Plan] request rejected 401 — stored token invalid; cleared. Re-authorize via the TF-Plan board button.');
        return Promise.reject('failed: HTTP 401 (token cleared)');
      }
      if (act === 'delete-card' && resp.status === 404) return {};  // already gone: fine
      if (!resp.ok) return Promise.reject(act + ' failed: HTTP ' + resp.status);
      return resp.json().catch(function(){ return {}; });
    }).then(function(body){
      if (act === 'create-link' && body && body.id) createdLinkId = body.id;
    });
  })
  .then(function(){
    /* shift the executed stage; persist created link id; drop entry when done */
    return t.get('board', 'shared', 'tfplan_index').then(function(index){
      index = index || {};
      var e = normEntry(index[cardId]);
      if (e){
        e.stages = (e.stages || []).slice(1);
        if (createdLinkId) e.linkCardId = createdLinkId;
        if (e.stages.length){
          delete e.claimedBy; delete e.claimedAt;
          index[cardId] = e;
        } else {
          delete index[cardId];
        }
      }
      return t.set('board', 'shared', 'tfplan_index', index);
    });
  })
  .then(function(){
    return t.get('board', 'shared', 'tfplan_log').then(function(log){
      log = log || [];
      var act = executed.action || 'move';
      log.unshift({
        cardId: cardId,
        cardName: entrySnap.cardName,
        destListName: executed.destListName,
        setByName: entrySnap.setByName,
        act: act === 'create-link' ? 'linked' : (act === 'delete-card' ? 'unlinked' : 'moved'),
        movedTs: Date.now()
      });
      if (log.length > LOG_CAP) log.length = LOG_CAP;
      return t.set('board', 'shared', 'tfplan_log', log);
    });
  })
  .then(function(){
    lastMoveError = null;
    console.log('[TF-Plan] ' + (executed.action || 'move') + ' executed for card ' + cardId + ' -> ' + executed.destListName);
  })
  .catch(function(reason){
    if (reason === 'gone' || reason === 'claimed-elsewhere' ||
        reason === 'lost-claim' || reason === 'not-due') return;
    lastMoveError = String(reason);
    console.warn('[TF-Plan] moveStage(' + cardId + '):', reason);
    return t.get('board', 'shared', 'tfplan_index').then(function(index){
      index = index || {};
      var e = index[cardId];
      if (e && e.claimedBy === CLIENT_ID){
        delete e.claimedBy;
        delete e.claimedAt;
        return t.set('board', 'shared', 'tfplan_index', index);
      }
    });
  });
}

/* =====================================================================
   CONNECTOR + SCAN LOOP
   ===================================================================== */

var scanT = null;
var scanTimerId = null;
var scanBusy = false;
var lastMoveError = null;

function ensureScanLoop(t){
  scanT = t;
  if (!scanTimerId){
    scanTimerId = setInterval(scanAndMove, SCAN_INTERVAL_MS);
    setTimeout(scanAndMove, 3000);
    console.log('[TF-Plan] scan loop started (' + CLIENT_ID + ')');
  }
}

function scanAndMove(){
  if (scanBusy || !scanT) return;
  scanBusy = true;
  var t = scanT;
  var now = Date.now();

  /* heartbeat: prove to panels/dashboard that a mover is alive here */
  t.set('board', 'shared', 'tfplan_health', {
    clientId: CLIENT_ID, ts: now, ver: APP_VERSION,
    authed: !!getStoredToken(), lastError: lastMoveError
  }).catch(function(){});

  t.get('board', 'shared', 'tfplan_index')
    .then(function(index){
      index = index || {};
      var dueIds = Object.keys(index).filter(function(id){
        var e = normEntry(index[id]);
        var st = pendingStage(e);
        if (!st || st.at > now) return false;
        if (e.claimedBy && e.claimedBy !== CLIENT_ID && (now - (e.claimedAt || 0)) < CLAIM_STALE_MS) return false;
        return true;
      });
      if (!dueIds.length) return null;

      var tok = getStoredToken();
      if (!tok){
        console.warn('[TF-Plan] stages are due but this client is not authorized — open the TF-Plan board button and authorize.');
        return null;
      }
      return dueIds.reduce(function(chain, cardId){
        return chain.then(function(){ return moveStage(t, cardId, tok); });
      }, Promise.resolve());
    })
    .catch(function(err){ console.warn('[TF-Plan] scan error', err); })
    .then(function(){ scanBusy = false; });
}

function estimatePanelHeight(entry){
  return entry ? 172 : 196;   // active box vs. mode seg + selects + duration row
}

function initConnector(){
  window.TrelloPowerUp.initialize({

    'board-buttons': function(t){
      ensureScanLoop(t);
      return [{
        icon: { light: ICON_LIGHT_UI, dark: ICON_DARK_UI },
        text: 'TF-Plan',
        callback: function(t){
          return t.popup({ title:'TF-Plan ' + APP_VERSION, url:'./tf-plan.html?mode=dashboard&v=' + APP_VERSION, height:420 });
        }
      }];
    },

    'card-badges': function(t){
      ensureScanLoop(t);
      var cardId = t.getContext().card;
      return t.get('board', 'shared', 'tfplan_index').then(function(index){
        if (!index || !index[cardId]) return [];
        return [{
          dynamic: function(t){
            return t.get('board', 'shared', 'tfplan_index').then(function(idx){
              var e = idx && normEntry(idx[t.getContext().card]);
              var st = pendingStage(e);
              if (!st) return { refresh: 60 };
              var rem = st.at - Date.now();
              return {
                icon: ICON_DARK_UI,
                text: (rem <= 0 ? 'moving…' : fmtRemaining(rem)) + ' ' + (st.sym || '→') + ' ' + st.destListName,
                color: rem <= 0 ? 'red' : (rem < 5 * 60000 ? 'yellow' : 'sky'),
                refresh: 10
              };
            });
          }
        }];
      });
    },

    /* persistent panel: always present on every card back */
    'card-back-section': function(t){
      ensureScanLoop(t);
      var cardId = t.getContext().card;
      return t.get('board', 'shared', 'tfplan_index').catch(function(){ return null; })
        .then(function(index){
          var entry = (index || {})[cardId] || null;
          return {
            title: 'TF-Plan ' + APP_VERSION,
            icon: ICON_NEUTRAL,
            content: {
              type: 'iframe',
              url: t.signUrl('./tf-plan.html?mode=panel&v=' + APP_VERSION),
              height: estimatePanelHeight(entry)
            }
          };
        });
    }

  }, { appKey: APP_KEY, appName: APP_NAME });
}

/* =====================================================================
   PANEL — persistent card-back section (the interface)
   ===================================================================== */

function initPanel(){
  var t = window.TrelloPowerUp.iframe({ appKey: APP_KEY, appName: APP_NAME });
  themeWithRetries(t);

  var app = document.getElementById('app');
  app.classList.add('panelwrap');
  document.documentElement.style.overflow = 'hidden';
  document.body.style.overflow = 'hidden';
  var cardId = t.getContext().card;
  var uiMode = 'boomerang';     // 'move' | 'boomerang' | '2step' | 'link'
  var selMinutes = 60;          // preset selection
  var selIndef = false;         // link mode: create with no deletion timer
  var cache = { entry: undefined, lists: [], card: null, me: null };

  function chip(txt, cls, ttl){
    var c = document.getElementById('chip');
    if (!c) return;
    c.hidden = false; c.textContent = txt; c.className = 'savechip push' + (cls ? ' ' + cls : '');
    if (ttl) setTimeout(function(){ c.hidden = true; }, ttl);
  }

  function fit(){
    try{ if (t.sizeTo) t.sizeTo('#app'); }catch(e){}
  }

  function load(){
    return Promise.all([
      t.get('board', 'shared', 'tfplan_index').catch(function(){ return null; }),
      t.lists('id', 'name'),
      t.card('id', 'name', 'idList', 'url', 'shortLink'),
      t.member('fullName'),
      t.get('board', 'shared', 'tfplan_health').catch(function(){ return null; })
    ]).then(function(res){
      var newEntry = normEntry((res[0] || {})[cardId] || null);
      cache.lists = res[1] || [];
      cache.card  = res[2];
      cache.me    = res[3];
      cache.health = res[4] || null;
      var changed = JSON.stringify(newEntry) !== JSON.stringify(cache.entry);
      cache.entry = newEntry;
      return changed;
    });
  }

  function overdueMsg(){
    var h = cache.health;
    if (!h || (Date.now() - (h.ts || 0)) > 60000)
      return 'Overdue — no mover heartbeat. No board tab is running TF-Plan; reload the board on the always-open machine.';
    if (!h.authed)
      return 'Overdue — a mover is running (' + (h.ver || '?') + ') but not authorized. TF-Plan board button → Authorize.';
    if (h.lastError)
      return 'Overdue — mover error: ' + h.lastError;
    return 'Overdue — mover active (' + (h.ver || '?') + '); retrying…';
  }

  function listOptions(id, excludeCurrent, hintCurrent){
    var html = '<select class="min" id="' + id + '">';
    var pickedFirst = false;
    cache.lists.forEach(function(l){
      var cur = (l.id === (cache.card && cache.card.idList));
      var dis = excludeCurrent && cur;
      var sel = (!dis && !pickedFirst) ? ' selected' : '';
      if (sel) pickedFirst = true;
      html += '<option value="' + l.id + '"' + (dis ? ' disabled' : sel) + '>' +
              esc(l.name) + (cur && hintCurrent ? ' (current)' : '') + '</option>';
    });
    return html + '</select>';
  }

  function render(){
    var e = cache.entry;
    var html = '';

    if (e){
      var st = pendingStage(e);
      var rem = st ? st.at - Date.now() : 0;
      var totalMs = (e.durationMin || 0) * 60000;
      var pct = totalMs > 0 ? Math.max(0, Math.min(100, (rem / totalMs) * 100)) : 0;
      html += '<div class="active-timer">' +
              '<div class="at-count">' + inlineClock(18) +
                '<span class="num' + (rem <= 0 ? ' due' : '') + '" id="atNum">' +
                (rem <= 0 ? 'moving…' : fmtCountdown(rem)) + '</span></div>' +
              '<div class="at-dest">' + esc(st ? (st.verb || 'moves to') : '') + ' <b>' + esc(st ? st.destListName : '') + '</b></div>' +
              '<div class="at-meta num">at ' + (st ? fmtClock(st.at) : '') + ' · set by ' + esc(e.setByName || '—') + '</div>' +
              '<div class="pb-row"><div class="pbar"><div class="pfill" id="pfill" style="width:' + pct.toFixed(2) + '%"></div></div>' +
              '<span class="pb-total" id="pbTotal">' + (e.mode === 'link' && !e.durationMin ? '∞' : fmtRemaining(totalMs)) + '</span></div>' +
              '<div class="hintline" id="ovd" hidden style="color:var(--yellow)">Overdue — no authorized mover has picked this up. Check the TF-Plan board button (authorize / version).</div>' +
              '<div class="at-row"><span class="savechip push" id="chip" hidden></span>' +
              '<button class="link danger" id="btnCancel" style="margin-left:8px">Cancel</button></div>' +
              '</div>';
    } else {
      html += '<div class="head"><div class="seg" id="modeSeg" role="group" aria-label="Timer mode">' +
              '<button data-mode="move" aria-pressed="' + (uiMode === 'move') + '">Move</button>' +
              '<button data-mode="boomerang" aria-pressed="' + (uiMode === 'boomerang') + '">Boomerang</button>' +
              '<button data-mode="2step" aria-pressed="' + (uiMode === '2step') + '">2-Step</button>' +
              '<button data-mode="link" aria-pressed="' + (uiMode === 'link') + '">Link Card</button>' +
              '</div><span class="savechip push" id="chip" hidden></span></div>';

      if (uiMode === 'move'){
        html += '<div class="lbl">Destination</div>' + listOptions('selA', true, true) +
                '<div class="hintline">Card stays put, then moves when the timer ends.</div>';
      } else if (uiMode === 'boomerang'){
        html += '<div class="lbl">Send to</div>' + listOptions('selA', true, true) +
                '<div class="hintline">Card goes now, and returns here when the timer ends.</div>';
      } else if (uiMode === '2step'){
        html += '<div class="lbl">First column (now)</div>' + listOptions('selA', true, true) +
                '<div class="lbl">Then to (after timer)</div>' + listOptions('selB', false, true);
      } else {
        html += '<div class="lbl">Place link in</div>' + listOptions('selA', true, true) +
                '<div class="hintline">A link card is created there now; this card stays put. It is deleted when the timer ends — pick ∞ to keep it indefinitely.</div>';
      }

      html += '<div class="lbl">Duration</div><div class="quick" id="presets">';
      [[30,'30m'],[60,'1h'],[120,'2h'],[240,'4h']].forEach(function(p){
        html += '<button data-min="' + p[0] + '" aria-pressed="' + (!selIndef && p[0] === selMinutes) + '">' + p[1] + '</button>';
      });
      if (uiMode === 'link'){
        html += '<button data-min="inf" aria-pressed="' + selIndef + '" title="Keep the link card indefinitely">∞</button>';
      }
      html += '<span class="cust"><input class="min num" type="number" id="custH" min="0" placeholder="–"><span class="u">h</span></span>' +
              '<span class="cust"><input class="min num" type="number" id="custM" min="0" placeholder="–"><span class="u">m</span></span>' +
              '<button class="go inline" id="btnStart">Start</button>' +
              '</div>';
    }

    app.innerHTML = html;
    wire();
    fit();
  }

  function customMinutes(){
    var h = parseFloat((document.getElementById('custH') || {}).value);
    var m = parseFloat((document.getElementById('custM') || {}).value);
    var hv = (!isNaN(h) && h > 0) ? h : 0;
    var mv = (!isNaN(m) && m > 0) ? m : 0;   // minutes may exceed 60 (90m == 1h 30m)
    var total = hv * 60 + mv;
    return total > 0 ? total : null;
  }

  function wire(){
    var seg = document.getElementById('modeSeg');
    if (seg) seg.onclick = function(ev){
      var b = ev.target.closest('button'); if (!b) return;
      uiMode = b.getAttribute('data-mode');
      render();
    };

    var cancelBtn = document.getElementById('btnCancel');
    if (cancelBtn) cancelBtn.onclick = function(){
      chip('cancelling…');
      var outcome;
      t.get('board', 'shared', 'tfplan_index').then(function(idx){
        idx = idx || {};
        outcome = buildCancel(idx, cardId);
        return t.set('board', 'shared', 'tfplan_index', idx);
      }).then(function(){
        if (outcome === 'scheduled'){
          chip('removing link…');
          var tok = getStoredToken();
          var done = tok ? moveStage(t, cardId, tok) : Promise.resolve();
          return done.then(sync);
        }
        cache.entry = null;
        render();
      }, function(){ chip('failed', 'err', 3000); });
    };

    var presets = document.getElementById('presets');
    if (presets) presets.onclick = function(ev){
      var b = ev.target.closest('button[data-min]'); if (!b) return;
      var v = b.getAttribute('data-min');
      selIndef = (v === 'inf');
      if (!selIndef) selMinutes = parseInt(v, 10);
      document.getElementById('custH').value = '';
      document.getElementById('custM').value = '';
      Array.prototype.forEach.call(presets.querySelectorAll('button[data-min]'), function(x){ x.setAttribute('aria-pressed', 'false'); });
      b.setAttribute('aria-pressed', 'true');
    };
    ['custH', 'custM'].forEach(function(id){
      var el = document.getElementById(id);
      if (el) el.oninput = function(){
        selIndef = false;
        Array.prototype.forEach.call(document.querySelectorAll('#presets button[data-min]'), function(x){ x.setAttribute('aria-pressed', 'false'); });
      };
    });

    var startBtn = document.getElementById('btnStart');
    if (startBtn) startBtn.onclick = onStart;
  }

  function onStart(){
    var selA = document.getElementById('selA');
    var selB = document.getElementById('selB');
    var aId = selA ? selA.value : null;
    var aName = selA ? selA.options[selA.selectedIndex].text.replace(/ \(current\)$/, '') : null;
    var bId = selB ? selB.value : null;
    var bName = selB ? selB.options[selB.selectedIndex].text.replace(/ \(current\)$/, '') : null;
    var indefinite = (uiMode === 'link' && selIndef && !customMinutes());
    var minutes = customMinutes() || selMinutes;
    var curId = cache.card.idList;
    var curName = (cache.lists.filter(function(l){ return l.id === curId; })[0] || {}).name || 'origin';

    if (!aId || aId === curId) return;
    if (!indefinite && !minutes) return;
    if (uiMode === '2step' && (!bId || bId === aId)){ chip('pick two different columns', 'err', 2600); return; }

    var now = Date.now();
    var stages;
    if (uiMode === 'move'){
      stages = [{ destListId: aId, destListName: aName, at: now + minutes * 60000, verb: 'moves to' }];
    } else if (uiMode === 'boomerang'){
      stages = [{ destListId: aId, destListName: aName, at: now, verb: 'moves to' },
                { destListId: curId, destListName: curName, at: now + minutes * 60000, verb: 'returns to' }];
    } else if (uiMode === '2step'){
      stages = [{ destListId: aId, destListName: aName, at: now, verb: 'moves to' },
                { destListId: bId, destListName: bName, at: now + minutes * 60000, verb: 'then to' }];
    } else { /* link */
      stages = [{ action:'create-link', destListId: aId, destListName: aName, at: now, verb: 'links into', sym: '⧉→' }];
      if (!indefinite){
        stages.push({ action:'delete-card', destListId: aId, destListName: aName, at: now + minutes * 60000, verb: 'removes link in', sym: '⧉✕' });
      }
    }

    var newEntry = {
      v: 3, mode: uiMode,
      cardName: cache.card.name,
      setByName: cache.me ? cache.me.fullName : null,
      createdTs: now,
      durationMin: indefinite ? 0 : minutes,
      stages: stages
    };
    if (uiMode === 'link') newEntry.sourceUrl = cache.card.shortLink
      ? 'https://trello.com/c/' + cache.card.shortLink
      : cache.card.url;

    chip('saving…');
    t.get('board', 'shared', 'tfplan_index').then(function(idx){
      idx = idx || {};
      idx[cardId] = newEntry;
      return t.set('board', 'shared', 'tfplan_index', idx);
    }).then(function(){
      cache.entry = newEntry;
      render();
      /* instant first hop if this browser is authorized; otherwise the
         always-open machine's scan loop picks it up within ~15 s */
      var tok = getStoredToken();
      if (tok && stages[0].at <= Date.now()){
        moveStage(t, cardId, tok).then(function(){ sync(); });
      }
    }, function(){ chip('save failed', 'err', 3000); });
  }

  /* 1s tick — countdown text + depleting progress bar, no relayout */
  function tick(){
    var e = cache.entry;
    if (!e) return;
    var st = pendingStage(e);
    var numEl = document.getElementById('atNum');
    var barEl = document.getElementById('pfill');
    if (!st || !numEl) return;
    var rem = st.at - Date.now();
    numEl.textContent = rem <= 0 ? 'moving…' : fmtCountdown(rem);
    numEl.classList.toggle('due', rem <= 0);
    if (barEl){
      var totalMs = (e.durationMin || 0) * 60000;
      var pct = totalMs > 0 ? Math.max(0, Math.min(100, (rem / totalMs) * 100)) : 0;
      barEl.style.width = pct.toFixed(2) + '%';
      barEl.classList.toggle('due', rem <= 0);
      barEl.classList.toggle('warn', rem > 0 && pct < 10);
    }
    var ovd = document.getElementById('ovd');
    if (ovd){
      var shouldShow = rem < -45000;   // stuck >45s past due: something is wrong
      if (shouldShow) ovd.textContent = overdueMsg();
      if (ovd.hidden === shouldShow){ ovd.hidden = !shouldShow; fit(); }
    }
  }

  /* periodic re-sync: catches external changes (stage executed by the
     kiosk, timer set elsewhere, cancel from the dashboard) */
  function sync(){
    load().then(function(changed){ if (changed) render(); });
  }

  load().then(render);
  t.render(function(){ applyTheme(t); sync(); });
  setInterval(tick, 1000);
  setInterval(sync, 10000);
  [400, 1000, 2000].forEach(function(ms){ setTimeout(fit, ms); });
}

/* =====================================================================
   DASHBOARD — board-button popup
   ===================================================================== */

function showSetup(){
  document.documentElement.setAttribute('data-color-mode', 'dark');
  document.body.style.background = 'var(--bg)';
  document.getElementById('app').innerHTML =
    '<div class="setup"><h2>' + inlineClock(16) + 'TF-Plan</h2>' +
    '<p>Countdown-and-move Power-Up for UC Davis Tech Foundry. This page is the Power-Up connector; it only becomes interactive inside Trello.</p>' +
    '<p><b>Setup:</b></p><ol>' +
    '<li>Create the Power-Up at trello.com/power-ups/admin; iframe connector URL = this page (no ?mode).</li>' +
    '<li>Add your GitHub Pages origin to Allowed Origins.</li>' +
    '<li>Enable capabilities: board-buttons, card-badges, card-back-section.</li>' +
    '<li>Paste the API key into APP_KEY in this file and redeploy.</li>' +
    '<li>On the always-open machine, open the board, click the TF-Plan board button, and authorize.</li></ol></div>';
}

function initDashboard(){
  var app = document.getElementById('app');
  var t = window.TrelloPowerUp.iframe({ appKey: APP_KEY, appName: APP_NAME });
  themeWithRetries(t);
  app.className = 'dash';

  function render(){
    Promise.all([
      t.get('board', 'shared', 'tfplan_index'),
      t.get('board', 'shared', 'tfplan_log'),
      t.get('board', 'shared', 'tfplan_health').catch(function(){ return null; })
    ]).then(function(res){
      var index = res[0] || {}, log = res[1] || [], health = res[2] || null;
      var authed = !!getStoredToken();
      var ids = Object.keys(index).sort(function(a, b){
        var sa = pendingStage(index[a]), sb = pendingStage(index[b]);
        return (sa ? sa.at : 0) - (sb ? sb.at : 0);
      });
      var html = '';

      var hb;
      if (!health || !health.ts) hb = '<span class="savechip err">no heartbeat</span>';
      else {
        var ago = Math.round((Date.now() - health.ts) / 1000);
        hb = ago <= 60
          ? '<span class="savechip ok">alive ' + ago + 's ago</span><span class="who">' + esc(health.ver || '') +
            (health.authed ? ' · authorized' : ' · NOT authorized') +
            (health.lastError ? ' · err: ' + esc(health.lastError) : '') + '</span>'
          : '<span class="savechip err">stale ' + (ago > 3600 ? Math.round(ago/3600) + 'h' : Math.round(ago/60) + 'm') + ' ago</span>';
      }
      html += '<div class="auth-row"><span class="lbl" style="margin:0">Mover</span>' + hb + '</div>';

      html += '<div class="auth-row"><span class="lbl" style="margin:0">This browser</span>' +
              (authed
                ? '<span class="savechip ok">authorized</span><span class="who" id="authAs"></span>' +
                  '<button class="link danger push" id="deauth">de-authorize</button>'
                : '<span class="savechip err">not authorized</span>') +
              '</div>';
      if (!authed){
        html += '<button class="go" id="btnAuth" style="margin-top:4px">' + inlineClock(14) + 'Authorize this browser to move cards</button>' +
                '<div class="empty">Timers can be set without this, but at least one always-open machine must be authorized for moves to fire. Use the shared TF service account there.</div>';
      }

      html += '<div class="lbl">Active timers (' + ids.length + ')</div>';
      if (!ids.length){
        html += '<div class="empty">None. Set one from the TF-Plan panel on any card.</div>';
      } else {
        html += '<table><tr><th>Card</th><th>Next</th><th>In</th><th></th></tr>';
        ids.forEach(function(id){
          var e = normEntry(index[id]);
          var st = pendingStage(e);
          var rem = st ? st.at - Date.now() : 0;
          html += '<tr>' +
                  '<td><b>' + esc(e.cardName) + '</b><br><span class="sub">' + esc(e.setByName || '') +
                    (e.mode && e.mode !== 'move' ? ' · ' + (e.mode === '2step' ? '2-step' : (e.mode === 'link' ? 'link card' : e.mode)) : '') + '</span></td>' +
                  '<td>' + esc(st ? ((st.verb || 'moves to') + ' ' + st.destListName) : '—') + '</td>' +
                  '<td class="cd' + (rem <= 0 ? ' due' : '') + '">' + (rem <= 0 ? 'due' : fmtRemaining(rem)) + '</td>' +
                  '<td><button class="link danger" data-cancel="' + id + '">cancel</button></td>' +
                  '</tr>';
        });
        html += '</table>';
      }

      html += '<div class="lbl">Recent moves</div>';
      if (!log.length){
        html += '<div class="empty">No moves logged yet.</div>';
      } else {
        html += '<div class="hist">';
        log.slice(0, 10).forEach(function(l){
          var ts = fmtTsCol(l.movedTs);
          var actTxt = l.act === 'linked' ? '⧉ linked into ' : (l.act === 'unlinked' ? '⧉ link removed from ' : '→ ');
          html += '<div class="he"><span class="ts"><span class="tsd">' + ts.d + '</span><span class="tst">' + ts.t + '</span></span>' +
                  '<span class="hn"><b>' + esc(l.cardName) + '</b> ' + actTxt + esc(l.destListName) +
                  '<small>set by ' + esc(l.setByName || '—') + '</small></span></div>';
        });
        html += '</div>';
      }

      app.innerHTML = html;

      var authBtn = document.getElementById('btnAuth');
      if (authBtn) authBtn.onclick = function(){ beginAuthorize(render); };

      var deauth = document.getElementById('deauth');
      if (deauth) deauth.onclick = function(){ clearToken(); render(); };

      var authAs = document.getElementById('authAs');
      if (authAs && authed){
        fetch('https://api.trello.com/1/members/me?fields=fullName&key=' + APP_KEY +
              '&token=' + getStoredToken())
          .then(function(r){
            if (r.status === 401){ clearToken(); render(); return null; }
            return r.ok ? r.json() : null;
          })
          .then(function(me){ if (me) authAs.textContent = 'as ' + me.fullName; })
          .catch(function(){});
      }

      Array.prototype.forEach.call(app.querySelectorAll('[data-cancel]'), function(b){
        b.onclick = function(){
          var id = b.getAttribute('data-cancel');
          var outcome;
          t.get('board', 'shared', 'tfplan_index').then(function(idx){
            idx = idx || {};
            outcome = buildCancel(idx, id);
            return t.set('board', 'shared', 'tfplan_index', idx);
          }).then(function(){
            var tok = getStoredToken();
            if (outcome === 'scheduled' && tok) return moveStage(t, id, tok);
          }).then(render);
        };
      });
    });
  }
  render();
  setInterval(render, 15000);
  t.render(function(){ applyTheme(t); render(); });
}

/* =====================================================================
   AUTH RETURN — top-level window Trello redirects to after Allow.
   ===================================================================== */

function initAuthReturn(){
  document.documentElement.setAttribute('data-color-mode', 'dark');
  document.body.style.background = 'var(--bg)';
  var app = document.getElementById('app');
  var m = window.location.hash.match(/[#&]token=([^&#?]+)/);
  if (m && m[1]){
    storeToken(m[1]);
    if (window.opener){
      try { window.opener.postMessage({ type:'tfplan-token', token:m[1] }, location.origin); } catch(e){}
    }
    app.innerHTML = '<div class="setup"><h2>' + inlineClock(16) + 'TF-Plan authorized ✓</h2>' +
                    '<p>This window will close itself. If it doesn\'t, close it and return to Trello.</p></div>';
    setTimeout(function(){ window.close(); }, 1200);
  } else {
    app.innerHTML = '<div class="setup"><h2>' + inlineClock(16) + 'Authorization did not complete</h2>' +
                    '<p>No token was returned. Close this window and try Authorize again.</p></div>';
  }
}

/* =====================================================================
   BOOT — guard against non-Trello contexts and slow CDN loads
   ===================================================================== */

function boot(){
  var mode = new URLSearchParams(window.location.search).get('mode') || 'connector';

  if (mode === 'authreturn') return initAuthReturn();

  var framed = (window.self !== window.top);
  var attempts = 0;
  (function go(){
    var hasTrello = (typeof window.TrelloPowerUp !== 'undefined');
    if (!hasTrello && framed && attempts++ < 20) return setTimeout(go, 150);
    if (!framed || !hasTrello){
      if (framed && !hasTrello) console.error('[TF-Plan] power-up.min.js did not load — check network/extensions.');
      return showSetup();
    }
    if      (mode === 'panel')     initPanel();
    else if (mode === 'dashboard') initDashboard();
    else                           initConnector();
  })();
}
boot();
</script>
</body>
